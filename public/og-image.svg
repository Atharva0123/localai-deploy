<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#060610"/>
      <stop offset="100%" stop-color="#0f0f28"/>
    </linearGradient>
    <!-- Purple glow -->
    <radialGradient id="glow1" cx="30%" cy="40%" r="45%">
      <stop offset="0%"   stop-color="#6e50ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6e50ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Green glow -->
    <radialGradient id="glow2" cx="75%" cy="65%" r="40%">
      <stop offset="0%"   stop-color="#00e5a0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00e5a0" stop-opacity="0"/>
    </radialGradient>
    <!-- Accent gradient for title -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a08bff"/>
      <stop offset="50%"  stop-color="#6e50ff"/>
      <stop offset="100%" stop-color="#4488ff"/>
    </linearGradient>
    <!-- Card shadow filter -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6e50ff" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#6e50ff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0"    y1="105" x2="1200" y2="105"/>
    <line x1="0"    y1="210" x2="1200" y2="210"/>
    <line x1="0"    y1="315" x2="1200" y2="315"/>
    <line x1="0"    y1="420" x2="1200" y2="420"/>
    <line x1="0"    y1="525" x2="1200" y2="525"/>
    <line x1="200"  y1="0"   x2="200"  y2="630"/>
    <line x1="400"  y1="0"   x2="400"  y2="630"/>
    <line x1="600"  y1="0"   x2="600"  y2="630"/>
    <line x1="800"  y1="0"   x2="800"  y2="630"/>
    <line x1="1000" y1="0"   x2="1000" y2="630"/>
  </g>

  <!-- ── Logo mark ─────────────────────────────────────────────────────────── -->
  <rect x="64" y="64" width="52" height="52" rx="14"
        fill="none" stroke="url(#titleGrad)" stroke-width="2"/>
  <text x="90" y="99" font-family="system-ui, sans-serif" font-size="28"
        font-weight="900" text-anchor="middle" fill="#6e50ff">⚡</text>

  <!-- ── Main title ────────────────────────────────────────────────────────── -->
  <text x="132" y="101" font-family="system-ui, -apple-system, sans-serif"
        font-size="44" font-weight="800" letter-spacing="-1" fill="url(#titleGrad)">
    LocalAIDeploy
  </text>
  <text x="132" y="123" font-family="system-ui, sans-serif"
        font-size="13" font-weight="500" letter-spacing="3" fill="#4a4570"
        text-transform="uppercase">v3.0</text>

  <!-- ── Tagline ────────────────────────────────────────────────────────────── -->
  <text x="64" y="175" font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="400" fill="#8880b8" letter-spacing="0.2">
    Compare every GPU for local AI deployment
  </text>

  <!-- ── Divider line ───────────────────────────────────────────────────────── -->
  <line x1="64" y1="198" x2="560" y2="198" stroke="url(#titleGrad)" stroke-width="2" stroke-opacity="0.5"/>

  <!-- ── Stat cards ────────────────────────────────────────────────────────── -->
  <!-- Card 1: Devices -->
  <rect x="64" y="228" width="180" height="90" rx="14"
        fill="#0f0f20" stroke="#6e50ff" stroke-opacity="0.35" stroke-width="1"
        filter="url(#cardShadow)"/>
  <text x="154" y="270" font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="36" font-weight="800" text-anchor="middle" fill="#a08bff">130+</text>
  <text x="154" y="296" font-family="system-ui, sans-serif"
        font-size="12" font-weight="600" text-anchor="middle" fill="#4a4570"
        letter-spacing="2">DEVICES</text>

  <!-- Card 2: Models -->
  <rect x="264" y="228" width="180" height="90" rx="14"
        fill="#0f0f20" stroke="#00e5a0" stroke-opacity="0.3" stroke-width="1"
        filter="url(#cardShadow)"/>
  <text x="354" y="270" font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="36" font-weight="800" text-anchor="middle" fill="#00e5a0">40+</text>
  <text x="354" y="296" font-family="system-ui, sans-serif"
        font-size="12" font-weight="600" text-anchor="middle" fill="#4a4570"
        letter-spacing="2">AI MODELS</text>

  <!-- Card 3: Quants -->
  <rect x="464" y="228" width="180" height="90" rx="14"
        fill="#0f0f20" stroke="#ffb830" stroke-opacity="0.3" stroke-width="1"
        filter="url(#cardShadow)"/>
  <text x="554" y="270" font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="36" font-weight="800" text-anchor="middle" fill="#ffb830">500+</text>
  <text x="554" y="296" font-family="system-ui, sans-serif"
        font-size="12" font-weight="600" text-anchor="middle" fill="#4a4570"
        letter-spacing="2">QUANTIZATIONS</text>

  <!-- ── Feature list ───────────────────────────────────────────────────────── -->
  <g font-family="system-ui, sans-serif" font-size="14" fill="#8880b8">
    <text x="64" y="365">✦  VRAM Calculator &amp; KV-Cache Estimator</text>
    <text x="64" y="393">✦  Build Planner with Cost &amp; Power Analysis</text>
    <text x="64" y="421">✦  NVIDIA · AMD · Intel · Apple Silicon</text>
    <text x="64" y="449">✦  Live HuggingFace Stats &amp; Weekly Refresh</text>
    <text x="64" y="477">✦  Stress Test Scoring Guide &amp; Tools</text>
  </g>

  <!-- ── Right side: GPU bar chart visualization ───────────────────────────── -->
  <!-- Chart background card -->
  <rect x="680" y="64" width="456" height="502" rx="18"
        fill="#0a0a18" stroke="#6e50ff" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Chart title -->
  <text x="908" y="105" font-family="system-ui, sans-serif"
        font-size="13" font-weight="700" text-anchor="middle" fill="#4a4570"
        letter-spacing="2">FP16 PERFORMANCE (TFLOPS)</text>

  <!-- Bar chart entries -->
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11">
    <!-- B200 SXM -->
    <text x="820" y="146" text-anchor="end" fill="#8880b8">B200 SXM</text>
    <rect x="826" y="132" width="260" height="18" rx="4" fill="#6e50ff" fill-opacity="0.9"/>
    <text x="1093" y="146" fill="#a08bff">2250 TF</text>

    <!-- H100 SXM -->
    <text x="820" y="178" text-anchor="end" fill="#8880b8">H100 SXM</text>
    <rect x="826" y="164" width="130" height="18" rx="4" fill="#6e50ff" fill-opacity="0.7"/>
    <text x="963" y="178" fill="#a08bff">267 TF</text>

    <!-- RTX PRO 6000 BW -->
    <text x="820" y="210" text-anchor="end" fill="#8880b8">RTX PRO 6000 BW</text>
    <rect x="826" y="196" width="97" height="18" rx="4" fill="#6e50ff" fill-opacity="0.6"/>
    <text x="930" y="210" fill="#a08bff">200 TF</text>

    <!-- RTX 5090 -->
    <text x="820" y="242" text-anchor="end" fill="#8880b8">RTX 5090</text>
    <rect x="826" y="228" width="102" height="18" rx="4" fill="#76b900" fill-opacity="0.8"/>
    <text x="935" y="242" fill="#a0c060">209 TF</text>

    <!-- RTX 4090 -->
    <text x="820" y="274" text-anchor="end" fill="#8880b8">RTX 4090</text>
    <rect x="826" y="260" width="40" height="18" rx="4" fill="#76b900" fill-opacity="0.6"/>
    <text x="873" y="274" fill="#a0c060">82 TF</text>

    <!-- MI300X -->
    <text x="820" y="306" text-anchor="end" fill="#8880b8">MI300X</text>
    <rect x="826" y="292" width="126" height="18" rx="4" fill="#ed1c24" fill-opacity="0.7"/>
    <text x="959" y="306" fill="#f08080">1300 TF</text>

    <!-- Radeon PRO W7900 -->
    <text x="820" y="338" text-anchor="end" fill="#8880b8">Pro W7900</text>
    <rect x="826" y="324" width="30" height="18" rx="4" fill="#ed1c24" fill-opacity="0.55"/>
    <text x="863" y="338" fill="#f08080">61 TF</text>

    <!-- RX 9070 XT -->
    <text x="820" y="370" text-anchor="end" fill="#8880b8">RX 9070 XT</text>
    <rect x="826" y="356" width="24" height="18" rx="4" fill="#ed1c24" fill-opacity="0.5"/>
    <text x="857" y="370" fill="#f08080">49 TF</text>

    <!-- Gaudi 3 -->
    <text x="820" y="402" text-anchor="end" fill="#8880b8">Gaudi 3</text>
    <rect x="826" y="388" width="90" height="18" rx="4" fill="#0071c5" fill-opacity="0.7"/>
    <text x="923" y="402" fill="#6ab0f0">1835 TF</text>

    <!-- M4 Ultra -->
    <text x="820" y="434" text-anchor="end" fill="#8880b8">M4 Ultra</text>
    <rect x="826" y="420" width="21" height="18" rx="4" fill="#888" fill-opacity="0.6"/>
    <text x="854" y="434" fill="#b0b0b0">42 TF</text>
  </g>

  <!-- Legend dots -->
  <g font-family="system-ui, sans-serif" font-size="11" fill="#4a4570">
    <circle cx="694" cy="506" r="5" fill="#6e50ff"/>
    <text x="705" y="510">NVIDIA</text>
    <circle cx="764" cy="506" r="5" fill="#ed1c24"/>
    <text x="775" y="510">AMD</text>
    <circle cx="814" cy="506" r="5" fill="#0071c5"/>
    <text x="825" y="510">Intel</text>
    <circle cx="866" cy="506" r="5" fill="#888"/>
    <text x="877" y="510">Apple</text>
  </g>

  <!-- ── URL bar at bottom ──────────────────────────────────────────────────── -->
  <rect x="0" y="580" width="1200" height="50" fill="#060610" fill-opacity="0.8"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#6e50ff" stroke-opacity="0.25" stroke-width="1"/>
  <text x="600" y="612" font-family="system-ui, sans-serif"
        font-size="15" font-weight="600" text-anchor="middle" fill="#4a4570"
        letter-spacing="1">localai-deploy.vercel.app</text>
</svg>
