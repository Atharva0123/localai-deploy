name: Weekly Data Refresh

# Runs every Sunday at 12:00 AM UTC
# Also triggerable manually from GitHub → Actions → "Run workflow"
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  refresh:
    name: Scrape HuggingFace + Rebuild
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to git push the updated JSON files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Scrape HuggingFace Hub API ──────────────────────────────────────────
      # Rate-limit: MAX_MODELS caps how many models are fetched per run.
      # HF_DELAY_MS controls the pause between each API call.
      # Without HF_TOKEN the free tier allows ~1000 requests/day which is
      # plenty for 20 models with 400ms delay.
      - name: Scrape HuggingFace model data
        run: npm run scrape:hf
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MAX_MODELS: 20
          HF_DELAY_MS: 500

      # ── India Retail Prices (optional, Playwright) ──────────────────────────
      # Disabled by default — enable by setting SCRAPE_INDIA_RETAIL=true
      # in your GitHub repo Secrets / Variables.
      - name: Scrape India retail prices
        run: npm run scrape
        if: vars.SCRAPE_INDIA_RETAIL == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SCRAPE_INDIA_RETAIL: true
          MAX_MODELS: 0
          MAX_GPUS: 10
          HF_DELAY_MS: 500

      # ── Commit updated JSON files if anything changed ───────────────────────
      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          # Only commit if files actually changed (diff --staged exits 1 if dirty)
          git diff --staged --quiet && echo "No changes — nothing to commit." || \
            git commit -m "chore: weekly data refresh [skip ci]"

      - name: Push changes
        run: git push
        # The [skip ci] tag in the commit message prevents Vercel from
        # treating this as a "user deploy" — but Vercel still rebuilds
        # because the push updates the branch. This is intentional.
